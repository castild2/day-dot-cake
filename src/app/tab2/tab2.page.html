<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      {{ pageName }}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ pageName }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-datetime #calendar min="2022-01-01" max="2022-12-31" presentation="date" (ionChange)="getExpireProducts(calendar.value)"></ion-datetime>


  <ion-card *ngFor="let item of itemsSelected">
    <ion-card-header>
      <ion-card-title>{{ item.name }}</ion-card-title>
    </ion-card-header>
  
    <ion-card-content>
      {{ item.expireDate }}
    </ion-card-content>
  </ion-card>

</ion-content>
